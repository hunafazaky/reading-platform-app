name: ci

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  ci:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node: [24]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. Install pnpm FIRST
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11 # You can omit this if your package.json has a "packageManager" field

      # 2. Setup Node AND cache pnpm dependencies
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      # (The 'corepack enable' step is no longer needed and can be deleted)

      - name: Install dependencies
        run: pnpm install --frozen-lockfile cross-env NODE_OPTIONS=--openssl-legacy-provider # Add NODE_OPTIONS to address OpenSSL issues in Node 24

      - name: Run linter
        run: pnpm lint

      - name: Run production build
        run: pnpm build
